spring:
  datasource:
    url: jdbc:h2:mem:ideapocket-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-test-secret
    expiration-minutes: 60
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*

