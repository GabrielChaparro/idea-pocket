services:
  db:
    image: postgres:16-alpine
    container_name: ideapocket-db
    environment:
      POSTGRES_DB: ideapocket
      POSTGRES_USER: ideapocket
      POSTGRES_PASSWORD: ideapocket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

