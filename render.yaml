services:
  - type: web
    name: farodeck-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ideapocket-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: ideapocket-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: ideapocket-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MINUTES
        value: 60
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: http://localhost:*,http://127.0.0.1:*,https://your-flutter-web-domain.example.com

databases:
  - name: ideapocket-db
    plan: free
    databaseName: ideapocket
    user: ideapocket
